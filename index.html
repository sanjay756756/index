<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚨 Cricket Alert 🚨</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #001f3f, #004d40);
            color: white;
            text-align: center;
        }
        
        .container {
            max-width: 900px;
            margin: auto;
            padding: 20px;
        }
        
        .title {
            font-size: 60px;
            color: #ffeb3b;
            text-shadow: 3px 3px 10px red;
        }
        
        .alert {
            background: #ffeb3b;
            color: black;
            padding: 20px;
            border-radius: 15px;
            margin: 20px;
            font-size: 32px;
            font-weight: bold;
        }
        
        .bakaya {
            background: #9c27b0;
            color: white;
            padding: 20px;
            border-radius: 15px;
            font-size: 70px;
            font-weight: bold;
            margin: 20px;
        }
        
        .qr-box {
            background: white;
            display: inline-block;
            padding: 20px;
            border-radius: 20px;
        }
        
        .qr-box img {
            width: 350px;
            max-width: 100%;
        }
        
        .footer {
            margin-top: 30px;
            font-size: 35px;
            color: #ffeb3b;
        }
        
        .note {
            background: #f44336;
            padding: 15px;
            margin-top: 20px;
            border-radius: 10px;
            font-size: 28px;
        }
    </style>
</head>

<body>

    <div class="container">

        <h1 class="title">🚨 CRICKET ALERT 🚨</h1>

        <div class="alert">
            🏏 Tu cricket khelne nahi aaya! <br><br> 💸 Bat ke paise bhi nahi diye!
        </div>

        <div class="bakaya">
            💰 BAKAYA ₹999999 💰
        </div>

        <h2>👇 PAYMENT YAHAN KARO 👇</h2>

        <div class="qr-box">
            <img src="gpay.jpg" alt="UPI QR">
        </div>

        <div class="footer">
            😆 Jaldi payment karo warna dosto ki committee action legi!
        </div>

        <div class="note">
            ✅ Match Miss <br> ✅ Paise Nahi Diye <br> ✅ Bahane 1000 <br><br> 😂 Pay Karo Aur Izzat Bachao 😂
        </div>

    </div>

</body>

</html>
